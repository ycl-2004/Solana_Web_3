name: Deploy Solana Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static Pages artifact
        run: |
          mkdir -p dist/pxsol-sim-stor
          cp -R "Solana_开发/Session_1/pxsol-sim-stor/web/." dist/pxsol-sim-stor/
          cat <<'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>SolanaWeb3 Projects</title>
              <style>
                body {
                  margin: 0;
                  min-height: 100vh;
                  font-family: Georgia, serif;
                  color: #1f1b18;
                  background: linear-gradient(135deg, #f8f3ec, #ece0cf);
                }
                main {
                  width: min(900px, calc(100% - 32px));
                  margin: 0 auto;
                  padding: 56px 0 80px;
                }
                .card {
                  margin-top: 24px;
                  padding: 24px;
                  border-radius: 24px;
                  background: rgba(255, 251, 245, 0.92);
                  box-shadow: 0 18px 44px rgba(50, 30, 12, 0.12);
                }
                a {
                  color: #8d3f24;
                }
              </style>
            </head>
            <body>
              <main>
                <p>SolanaWeb3 Monorepo</p>
                <h1>Projects</h1>
                <div class="card">
                  <h2>pxsol-sim-stor</h2>
                  <p>最小链上存储实验，现已提供 Phantom + devnet 前端留言板版本。</p>
                  <p><a href="./pxsol-sim-stor/">打开项目页面</a></p>
                </div>
              </main>
            </body>
          </html>
          EOF
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
